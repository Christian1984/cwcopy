<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1e3a8a"/>
  <!-- Morse code decorations: C = -.-. W = .-- -->
  <g fill="#93c5fd" opacity="0.5">
    <!-- C: dash dot dash dot -->
    <rect x="56" y="96" width="44" height="16" rx="8"/>
    <circle cx="118" cy="104" r="8"/>
    <rect x="134" y="96" width="44" height="16" rx="8"/>
    <circle cx="196" cy="104" r="8"/>
    <!-- W: dot dash dash -->
    <circle cx="220" cy="104" r="8"/>
    <rect x="236" y="96" width="44" height="16" rx="8"/>
    <rect x="288" y="96" width="44" height="16" rx="8"/>
  </g>
  <text
    x="256" y="340"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="256"
    font-weight="800"
    text-anchor="middle"
    fill="white"
    letter-spacing="-8"
  >CW</text>
</svg>
